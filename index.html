// ── Drag & drop des photos via touch (appui long) ──────────────────────
let photoDragState = null;
const PHOTO_DRAG_HOLD_MS = 350;
const PHOTO_DRAG_CANCEL_PX = 10;

function bindPhotoDragOnce(){
  if (window._photoDragBound) return;
  window._photoDragBound = true;
  document.addEventListener('touchstart', onPhotoTouchStart, { passive: true });
  document.addEventListener('touchmove', onPhotoTouchMove, { passive: false });
  document.addEventListener('touchend', onPhotoTouchEnd, { passive: true });
  document.addEventListener('touchcancel', onPhotoTouchEnd, { passive: true });
}

function onPhotoTouchStart(e){
  // Ne s'active que si on touche une form-photo-item (et pas un bouton dedans)
  const item = e.target.closest('.form-photo-item');
  if (!item) return;
  if (e.target.closest('button')) return;
  if (!item.parentNode || item.parentNode.id !== 'form-photos') return;
  const touch = e.touches[0];
  photoDragState = {
    item,
    startX: touch.clientX,
    startY: touch.clientY,
    dragging: false,
    holdTimer: setTimeout(() => {
      if (!photoDragState) return;
      startPhotoDrag(touch);
    }, PHOTO_DRAG_HOLD_MS),
  };
}

function startPhotoDrag(touch){
  const item = photoDragState.item;
  const rect = item.getBoundingClientRect();
  photoDragState.offsetX = touch.clientX - rect.left;
  photoDragState.offsetY = touch.clientY - rect.top;
  photoDragState.w = rect.width;
  photoDragState.h = rect.height;
  photoDragState.dragging = true;
  item.classList.add('dragging');
  item.style.position = 'fixed';
  item.style.left = (touch.clientX - photoDragState.offsetX) + 'px';
  item.style.top = (touch.clientY - photoDragState.offsetY) + 'px';
  item.style.width = rect.width + 'px';
  item.style.height = rect.height + 'px';
  item.style.pointerEvents = 'none';
  if (navigator.vibrate) try { navigator.vibrate(15); } catch {}
}

function onPhotoTouchMove(e){
  if (!photoDragState) return;
  const touch = e.touches[0];
  if (!photoDragState.dragging) {
    // Annule l'appui long si le doigt bouge trop avant déclenchement
    const dx = touch.clientX - photoDragState.startX;
    const dy = touch.clientY - photoDragState.startY;
    if (Math.abs(dx) > PHOTO_DRAG_CANCEL_PX || Math.abs(dy) > PHOTO_DRAG_CANCEL_PX) {
      clearTimeout(photoDragState.holdTimer);
      photoDragState = null;
    }
    return;
  }
  // Drag actif : on bloque le scroll
  e.preventDefault();
  e.stopPropagation();
  const item = photoDragState.item;
  item.style.left = (touch.clientX - photoDragState.offsetX) + 'px';
  item.style.top = (touch.clientY - photoDragState.offsetY) + 'px';
  // Trouver la cible sous le doigt
  const under = document.elementFromPoint(touch.clientX, touch.clientY);
  const target = under && under.closest('.form-photo-item');
  if (target && target !== item && target.parentNode === item.parentNode) {
    const tRect = target.getBoundingClientRect();
    const insertBefore = touch.clientX < tRect.left + tRect.width/2;
    if (insertBefore) {
      target.parentNode.insertBefore(item, target);
    } else {
      target.parentNode.insertBefore(item, target.nextSibling);
    }
  }
}

function onPhotoTouchEnd(){
  if (!photoDragState) return;
  clearTimeout(photoDragState.holdTimer);
  if (photoDragState.dragging) {
    const item = photoDragState.item;
    item.classList.remove('dragging');
    item.style.position = '';
    item.style.left = '';
    item.style.top = '';
    item.style.width = '';
    item.style.height = '';
    item.style.pointerEvents = '';
    refreshPhotoBadges();
  }
  photoDragState = null;
}

function closeSheet(){
  const sheet=document.getElementById('sheet');
  const overlay=document.getElementById('overlay');
  // Pile de retour : si on vient d'une vue semaine (Année → semaine → recette),
  // on revient à la semaine au lieu de fermer complètement.
  if (sheetStack.length > 0) {
    const prev = sheetStack.pop();
    if (prev && prev.type === 'week') {
      // Annule un éventuel transform de swipe
      sheet.style.transition='';
      sheet.style.transform='';
      overlay.style.opacity='';
      currentSheetId = null;
      openWeekSheet(prev.w);
      return;
    }
  }
  // Fermeture complète
  sheet.style.transition='';
  if(sheet.style.transform){
    sheet.style.transform='translateX(-50%) translateY(102%)';
    setTimeout(()=>{ sheet.style.transform=''; }, 350);
  }
  sheet.classList.remove('open');
  overlay.classList.remove('open');
  overlay.style.opacity='';
  currentSheetId=null;
  sheetWeek=null;
}

// ── Swipe down to dismiss (sheet) ────────────────────────────────────────
function bindSheetSwipe(){
  const sheet=document.getElementById('sheet');
  const overlay=document.getElementById('overlay');
  let startY=0, lastY=0, dragging=false, dragStart=0;
  const SWIPE_THRESHOLD=120; // px

  sheet.addEventListener('touchstart', (e)=>{
    // Ne pas démarrer un swipe si l'utilisateur est en train de scroller le contenu
    if(sheet.scrollTop>0){ dragging=false; return; }
    if(!sheet.classList.contains('open')){ dragging=false; return; }
    startY=e.touches[0].clientY;
    lastY=startY;
    dragStart=Date.now();
    dragging=true;
    sheet.style.transition='none';
  }, { passive: true });

  sheet.addEventListener('touchmove', (e)=>{
    if(!dragging) return;
    const y=e.touches[0].clientY;
    lastY=y;
    const diff=y-startY;
    if(diff<0){
      // Swipe vers le haut : on annule
      sheet.style.transform='';
      overlay.style.opacity='';
      sheet.style.transition='';
      dragging=false;
      return;
    }
    // Suit le doigt
    sheet.style.transform=`translateX(-50%) translateY(${diff}px)`;
    // Fade léger de l'overlay
    overlay.style.opacity=String(Math.max(0.15, 1 - diff/500));
  }, { passive: true });

  const endHandler=()=>{
    if(!dragging) return;
    dragging=false;
    sheet.style.transition='';
    const diff=lastY-startY;
    const elapsed=Date.now()-dragStart;
    const fastFlick=elapsed<300 && diff>50;
    if(diff>SWIPE_THRESHOLD || fastFlick){
      closeSheet();
    } else {
      // Snap back
      sheet.style.transform='';
      overlay.style.opacity='';
    }
  };
  sheet.addEventListener('touchend', endHandler, { passive: true });
  sheet.addEventListener('touchcancel', endHandler, { passive: true });
}

  const btn=document.getElementById('btn-'+name);

function shoppingStorageKey(week){ return `shopping-${week}-v2`; }
function loadShoppingChecked(week){
  try { const raw = localStorage.getItem(shoppingStorageKey(week)); return new Set(raw ? JSON.parse(raw) : []); }
  catch { return new Set(); }
}

// Calcule la liste des clés d'agrégation pour une ligne d'ingrédient brute
function aggKeysForLine(line){
  const parsed = parseIngredientLine(line);
  if (!parsed.name) return [];
  const out = [];
  for (const part of splitCompoundName(parsed.name)) {
    const cleaned = stripPrepAdjectives(part.trim());
    if (!cleaned) continue;
    const k = normalizeIngredientName(cleaned);
    if (k) out.push(k);
  }
  return out;
}
function saveShoppingChecked(week, set){
  try { localStorage.setItem(shoppingStorageKey(week), JSON.stringify([...set])); } catch {}
}

function parseIngredients(text){
  if (!text || typeof text !== 'string') return [];
  return text.split(/\r?\n/).map(line => {
    return line.replace(/^[\s•\-\*]+/, '').trim();
  }).filter(line => {
    if (line.length === 0 || line.length >= 200) return false;
    // Filtre les titres de section qui ne sont pas des ingrédients
    if (/^pour\s+(la|le|les|l['']|une|un|mon|ma|mes)\b/i.test(line)) return false;
    if (/^ingr[ée]dients?\s*:?\s*$/i.test(line)) return false;
    if (/^(pr[ée]paration|[ée]tapes?|instructions?|recette|d[ée]roul[ée]|mat[ée]riel)\s*:?\s*$/i.test(line)) return false;
    // Lignes qui se finissent par ":" sont souvent des titres de section
    if (/[a-zà-ÿ]\s*:\s*$/i.test(line) && line.length < 40) return false;
    return true;
  });
}

// Adjectifs de préparation (participes passés) à retirer du nom : râpé,
// haché, émincé, coupé en cubes/dés, fondu, cuit, écrasé, etc.
function stripPrepAdjectives(name){
  if (!name) return name;
  const adj = /\s+(?:r[âa]pp?[ée]e?s?|hach[ée]e?s?|[ée]minc[ée]e?s?|d[ée]?coup[ée]e?s?|fondu[se]?s?|cuit[se]?s?|[ée]cras[ée]e?s?|m[ée]lang[ée]e?s?|marin[ée]e?s?|frit[se]?s?|grill[ée]e?s?|r[ôo]ti[se]?s?|pel[ée]e?s?|tranch[ée]e?s?|effeuill[ée]e?s?|en\s+(?:cubes?|d[ée]s|lamelles?|rondelles?|tranches?|morceaux|julienne|brunoise))\b/gi;
  return name.replace(adj, '').replace(/\s+/g, ' ').trim();
}

// Tente d'extraire (qty, unit, nom) d'une ligne d'ingrédient.
// Exemples : "200g pâtes", "2 oeufs", "1 c.à.s d'huile", "500 g de farine"
function detectUnit(raw){
  if (!raw) return null;
  const lower = raw.toLowerCase();
  const noSp = lower.replace(/[.\s]+/g, '');
  // Abréviations de cuillère
  if (noSp === 'cas' || noSp === 'càs' || noSp === 'cs') return 'c.s';
  if (noSp === 'cac' || noSp === 'càc' || noSp === 'cc') return 'c.c';
  // Unités métriques (avec ou sans pluriel)
  const map = {
    'g':'g','gramme':'g','grammes':'g',
    'kg':'kg','kilo':'kg','kilos':'kg','kilogramme':'kg','kilogrammes':'kg',
    'mg':'mg','milligramme':'mg','milligrammes':'mg',
    'l':'l','litre':'l','litres':'l',
    'ml':'ml','millilitre':'ml','millilitres':'ml',
    'cl':'cl','centilitre':'cl','centilitres':'cl',
    'dl':'dl','decilitre':'dl','decilitres':'dl','décilitre':'dl','décilitres':'dl',
  };
  if (map[lower]) return map[lower];
  // Mots usuels (par préfixe pour gérer pluriels)
  if (/^cuiller/i.test(raw)) return 'c.s';   // défaut, ajusté plus tard si "à café"
  if (/^pinc/i.test(raw))    return 'pincée';
  if (/^gousse/i.test(raw))  return 'gousse';
  if (/^tranche/i.test(raw)) return 'tranche';
  if (/^feuille/i.test(raw)) return 'feuille';
  if (/^brin/i.test(raw))    return 'brin';
  if (/^botte/i.test(raw))   return 'botte';
  if (/^paquet/i.test(raw))  return 'paquet';
  if (/^sachet/i.test(raw))  return 'sachet';
  if (/^bo[îi]te/i.test(raw)) return 'boîte';
  if (/^pot/i.test(raw))     return 'pot';
  if (/^tasse/i.test(raw))   return 'tasse';
  if (/^verre/i.test(raw))   return 'verre';
  if (/^bol/i.test(raw))     return 'bol';
  return null;
}
function parseIngredientLine(line){
  line = (line || '').replace(/^[\s•\-\*]+/, '').trim();
  // Pattern : nombre + optional token unité + optional reste
  const m = line.match(/^(\d+(?:[.,]\d+)?(?:\s*\/\s*\d+(?:[.,]\d+)?)?)\s*([a-zà-ÿA-ZÀ-Ÿ\.]+)?\s+(.+)$/);
  if (!m) return { qty: null, unit: '', name: stripPrepAdjectives(line), raw: line };
  let q;
  if (m[1].includes('/')) {
    const [a, b] = m[1].split('/').map(s => parseFloat(s.replace(',', '.')));
    q = (b && !isNaN(a)) ? a / b : null;
  } else {
    q = parseFloat(m[1].replace(',', '.'));
  }
  let unit = '', rest = m[3].trim();
  const detected = m[2] ? detectUnit(m[2]) : null;
  if (detected) {
    unit = detected;
    // Si "cuillère" : chercher "à soupe" ou "à café" dans la suite
    if (/^cuiller/i.test(m[2])) {
      const after = rest.match(/^à\s+(soupe|caf[éeè])\b\s*/i);
      if (after) {
        unit = after[1].toLowerCase().startsWith('caf') ? 'c.c' : 'c.s';
        rest = rest.slice(after[0].length).trim();
      }
    }
  } else if (m[2]) {
    // Pas une unité connue : on remet le mot dans le nom
    rest = m[2] + ' ' + rest;
  }
  // Strip leading article ("de", "d'", "des", etc.)
  rest = rest.replace(/^d['']\s*/i, '').replace(/^(de|du|des|la|le|les)\s+/i, '').trim();
  // Nettoie les adjectifs de préparation ("râpées", "hachées", etc.)
  rest = stripPrepAdjectives(rest);
  return { qty: q, unit, name: rest, raw: line };
}
function normalizeIngredientName(name){
  return (name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\(.+?\)/g, '')
    .replace(/[^a-z0-9 ]/g, ' ')
    .replace(/\s+/g, ' ')
    .replace(/s$/,'')
    .trim();
}

// D\u00e9coupe un nom d'ingr\u00e9dient compos\u00e9 en parties individuelles.
// "Sel et poivre" \u2192 ["sel", "poivre"]
// "Sel, poivre" \u2192 ["sel", "poivre"]
// "Sel-poivre" \u2192 ["sel", "poivre"]
// "Huile d'olive" \u2192 ["huile d'olive"] (pas de connecteur)
function splitCompoundName(name){
  if (!name) return [];
  // Splitters avec espaces : "et", "ou", "&", "/", "+", ","
  let parts = [name];
  const splitters = [
    /\s+et\s+/gi,
    /\s+ou\s+/gi,
    /\s*&\s*/g,
    /\s*\/\s*/g,
    /\s*\+\s*/g,
    /\s*,\s*/g,
  ];
  for (const re of splitters) {
    parts = parts.flatMap(p => p.split(re));
  }
  // Hyphen entre 2 mots (a-b sans espaces) : "sel-poivre" \u2192 ["sel", "poivre"]
  parts = parts.flatMap(p => {
    if (/^[a-z\u00e0-\u00ff]{2,}-[a-z\u00e0-\u00ff]{2,}$/i.test(p.trim())) {
      return p.trim().split('-');
    }
    return [p];
  });
  return parts.map(p => p.trim()).filter(p => p.length > 0);
}
function formatQty(q){
  if (q == null) return '';
  if (Number.isInteger(q)) return String(q);
  return q.toFixed(1).replace('.', ',').replace(/,0$/, '');
}
function formatQtyUnit(q, unit){
  const n = formatQty(q);
  if (!unit) return n;
  if (['g','kg','mg','ml','cl','dl','l'].includes(unit)) return n + ' ' + unit;
  if (unit === 'c.s') return n + ' c. à soupe';
  if (unit === 'c.c') return n + ' c. à café';
  const plurals = {
    'pincée':'pincées','gousse':'gousses','tranche':'tranches','feuille':'feuilles',
    'brin':'brins','botte':'bottes','paquet':'paquets','sachet':'sachets',
    'boîte':'boîtes','pot':'pots','tasse':'tasses','verre':'verres','bol':'bols',
  };
  if (q > 1 && plurals[unit]) return n + ' ' + plurals[unit];
  return n + ' ' + unit;
}
function aggregateIngredients(entries){
  // entries: [{ line, recetteTitre, recetteId }]
  // Pour chaque ligne, on parse + on split le nom en parties.
  // "Sel et poivre" produit 2 entrées dans 2 groupes différents.
  const groups = new Map();
  for (const e of entries) {
    const parsed = parseIngredientLine(e.line);
    if (!parsed.name) continue;
    const nameParts = splitCompoundName(parsed.name);
    const isCompound = nameParts.length > 1;
    for (const part of nameParts) {
      const cleaned = stripPrepAdjectives(part.trim());
      if (!cleaned) continue;
      const key = normalizeIngredientName(cleaned);
      if (!key) continue;
      if (!groups.has(key)) groups.set(key, {
        key,
        displayName: cleaned,
        byUnit: new Map(),
        unparsedCount: 0,
        recettesMap: new Map(),     // id -> titre (dedup)
        originalLines: new Set(),
      });
      const g = groups.get(key);
      g.recettesMap.set(e.recetteId, e.recetteTitre);
      g.originalLines.add(e.line);
      // Quantité : ne s'applique qu'aux non-composés (ambiguïté)
      if (!isCompound && parsed.qty != null) {
        g.byUnit.set(parsed.unit, (g.byUnit.get(parsed.unit) || 0) + parsed.qty);
      } else {
        g.unparsedCount++;
      }
    }
  }
  const out = [];
  for (const g of groups.values()) {
    const parts = [];
    for (const [u, q] of g.byUnit) parts.push(formatQtyUnit(q, u));
    if (g.unparsedCount > 0 && parts.length === 0) {
      parts.push(g.unparsedCount + ' fois');
    } else if (g.unparsedCount > 0) {
      parts.push('+ ' + g.unparsedCount + ' sans qté');
    }
    out.push({
      key: g.key,
      displayName: g.displayName.charAt(0).toUpperCase() + g.displayName.slice(1),
      quantityText: parts.join(' + '),
      recettes: [...g.recettesMap.entries()].map(([id, titre]) => ({ id, titre })),
      originalLines: [...g.originalLines],
      count: g.recettesMap.size,
    });
  }
  out.sort((a, b) => a.displayName.localeCompare(b.displayName, 'fr'));
  return out;
}

let currentShoppingAgg = [];
let shoppingView = (typeof localStorage !== 'undefined' && localStorage.getItem('shopping-view-mode')) || 'agg';

function setShoppingView(mode){
  shoppingView = mode;
  try { localStorage.setItem('shopping-view-mode', mode); } catch {}
  rerenderShopping();
}

function renderShoppingList(){
  const w = planningWeek;
  const items = (all || []).filter(r => Array.isArray(r.semaines) && r.semaines.some(s => WM[s] === w));
  let html = weekPickerHTML(w);
  html += `<div class="shopping-view-toggle">
    <button class="shopping-toggle-btn${shoppingView==='agg'?' active':''}" onclick="setShoppingView('agg')">${icon('clipboard',{size:14,stroke:1.8})}<span>Agrégé</span></button>
    <button class="shopping-toggle-btn${shoppingView==='recipe'?' active':''}" onclick="setShoppingView('recipe')">${icon('bookOpen',{size:14,stroke:1.8})}<span>Par recette</span></button>
  </div>`;
  if (!items.length) {
    return html + `<div class="shopping-empty">Aucune recette planifiée pour cette semaine.</div>`;
  }
  const entries = [];
  for (const r of items) {
    const lines = parseIngredients(r.ingredients);
    for (const line of lines) entries.push({ line, recetteTitre: r.titre, recetteId: r.id });
  }
  if (!entries.length) {
    return html + `<div class="shopping-empty">Aucun ingrédient renseigné dans les ${items.length} recettes de cette semaine.</div>`;
  }
  const checked = loadShoppingChecked(w);
  const totalLines = entries.length;
  const checkedCount = entries.filter(e => checked.has(e.line)).length;
  html += `<div class="shopping-meta">
    <span class="shopping-meta-stat">${items.length} recettes · ${totalLines} ingrédients · ${checkedCount} ✓</span>
    <div class="shopping-meta-actions">
      <button class="shopping-meta-btn" onclick="shoppingToggleAll(true)">Tout cocher</button>
      <button class="shopping-meta-btn" onclick="shoppingToggleAll(false)">Décocher</button>
    </div>
  </div>`;
  if (shoppingView === 'agg') {
    currentShoppingAgg = aggregateIngredients(entries);
    html += renderShoppingAggView(currentShoppingAgg, checked);
  } else {
    html += renderShoppingRecipeView(entries, checked);
  }
  return html;
}

function renderShoppingRecipeView(entries, checked){
  // L'état coché est par clé d'agrégation. Une ligne est "checked" si TOUTES
  // ses clés (1 simple, 2+ pour un composé) sont dans le Set.
  const byRecipe = new Map();
  for (const e of entries) {
    if (!byRecipe.has(e.recetteId)) byRecipe.set(e.recetteId, { titre: e.recetteTitre, lines: [] });
    byRecipe.get(e.recetteId).lines.push(e.line);
  }
  let html = `<div class="shopping-groups">`;
  for (const [recetteId, group] of byRecipe) {
    html += `<div class="shopping-group">
      <div class="shopping-group-head" onclick="openSheet('${recetteId}')" style="cursor:pointer">${escHtml(group.titre)}</div>
      <div class="shopping-items">`;
    for (const line of group.lines) {
      const keys = aggKeysForLine(line);
      const isChecked = keys.length > 0 && keys.every(k => checked.has(k));
      const keysJson = JSON.stringify(keys).replace(/"/g, '&quot;');
      html += `<div class="shopping-item${isChecked?' checked':''}" data-keys="${keysJson}" onclick="shoppingToggleLine(this)">
        <div class="shopping-check">${icon('check',{size:13,stroke:2.6})}</div>
        <div class="shopping-text">${escHtml(line)}</div>
      </div>`;
    }
    html += `</div></div>`;
  }
  html += `</div>`;
  return html;
}

function renderShoppingAggView(aggregated, checked){
  let html = `<div class="shopping-groups"><div class="shopping-items" style="margin-top:6px">`;
  aggregated.forEach((agg, idx) => {
    const isChecked = checked.has(agg.key);
    const recipesHTML = agg.recettes.map(r =>
      `<button class="shopping-recipe-link" onclick="event.stopPropagation(); openSheet('${r.id}')">${escHtml(r.titre)}</button>`
    ).join('');
    html += `<div class="shopping-item${isChecked?' checked':''}" onclick="shoppingToggleAgg(this, ${idx})">
      <div class="shopping-check">${icon('check',{size:13,stroke:2.6})}</div>
      <div class="shopping-text">
        <span class="shopping-item-name">${escHtml(agg.displayName)}</span>
        ${agg.quantityText ? `<span class="shopping-item-qty">${escHtml(agg.quantityText)}</span>` : ''}
        ${recipesHTML ? `<div class="shopping-recipes">${recipesHTML}</div>` : ''}
      </div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function shoppingToggleLine(el){
  const w = planningWeek;
  const checked = loadShoppingChecked(w);
  let keys = [];
  try { keys = JSON.parse(el.dataset.keys || '[]'); } catch {}
  if (!keys.length) return;
  const allChecked = keys.every(k => checked.has(k));
  if (allChecked) {
    keys.forEach(k => checked.delete(k));
    el.classList.remove('checked');
  } else {
    keys.forEach(k => checked.add(k));
    el.classList.add('checked');
  }
  saveShoppingChecked(w, checked);
  updateShoppingMetaStat();
}

function shoppingToggleAgg(el, idx){
  const w = planningWeek;
  const checked = loadShoppingChecked(w);
  const agg = currentShoppingAgg[idx];
  if (!agg) return;
  if (checked.has(agg.key)) {
    checked.delete(agg.key);
    el.classList.remove('checked');
  } else {
    checked.add(agg.key);
    el.classList.add('checked');
  }
  saveShoppingChecked(w, checked);
  updateShoppingMetaStat();
}

function updateShoppingMetaStat(){
  const w = planningWeek;
  const checked = loadShoppingChecked(w);
  const items = (all || []).filter(r => Array.isArray(r.semaines) && r.semaines.some(s => WM[s] === w));
  let total = 0;
  for (const r of items) total += parseIngredients(r.ingredients).length;
  const stat = document.querySelector('.shopping-meta-stat');
  if (stat) stat.textContent = `${items.length} recettes · ${total} ingrédients · ${checked.size} ✓`;
}

// Génère le texte plein de la liste de courses pour partage
function buildShoppingExportText(week){
  const items = (all || []).filter(r => Array.isArray(r.semaines) && r.semaines.some(s => WM[s] === week));
  if (!items.length) return '';
  const entries = [];
  for (const r of items) {
    for (const line of parseIngredients(r.ingredients)) {
      entries.push({ line, recetteTitre: r.titre, recetteId: r.id });
    }
  }
  if (!entries.length) return '';
  const aggregated = aggregateIngredients(entries);
  const label = WL[week] || `Semaine ${week}`;
  const s = saison(week);
  const sm = SM[s];
  // Plain-text partagé : on garde les emojis ici car ils s'affichent
  // dans Messages/Notes/SMS (cibles natives = emoji-friendly).
  let txt = `🛒 Liste de courses\n${label}  ·  ${s}\n`;
  try {
    const range = weekDateRange(new Date().getFullYear(), week);
    txt += `${fmtDateShort(range.monday)} → ${fmtDateShort(range.sunday)}\n`;
  } catch {}
  txt += `\n${items.length} recette${items.length>1?'s':''} · ${aggregated.length} ingrédient${aggregated.length>1?'s':''}\n\n`;
  for (const agg of aggregated) {
    const qty = agg.quantityText ? `  —  ${agg.quantityText}` : '';
    txt += `• ${agg.displayName}${qty}\n`;
  }
  txt += `\n— Généré par OnMangeQuoiMaman?`;
  return txt;
}

async function shareShoppingList(){
  const w = planningWeek;
  const txt = buildShoppingExportText(w);
  if (!txt) {
    alert('Aucun ingrédient à partager pour cette semaine.');
    return;
  }
  const label = WL[w] || `Semaine ${w}`;
  const title = `Liste de courses — ${label}`;
  // Try Web Share API first
  if (navigator.share) {
    try {
      await navigator.share({ title, text: txt });
      return;
    } catch (e) {
      if (e && e.name === 'AbortError') return;
      console.error('Share:', e);
      // fallthrough to clipboard
    }
  }
  // Fallback clipboard
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try {
      await navigator.clipboard.writeText(txt);
      alert('Liste copiée dans le presse-papier ✓\nColle-la où tu veux (Notes, Messages, etc.)');
      return;
    } catch (e) {
      console.error('Clipboard:', e);
    }
  }
  // Last-resort fallback
  const ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.position = 'fixed';
  ta.style.top = '0';
  ta.style.left = '0';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch {}
  ta.remove();
  if (ok) alert('Liste copiée ✓');
  else alert('Copie impossible. Voici le texte :\n\n' + txt);
}

function shoppingToggleAll(state){
  const w = planningWeek;
  const items = (all || []).filter(r => Array.isArray(r.semaines) && r.semaines.some(s => WM[s] === w));
  // Calcule toutes les clés d'agrégation pour la semaine
  const allKeys = new Set();
  for (const r of items) {
    for (const line of parseIngredients(r.ingredients)) {
      for (const k of aggKeysForLine(line)) allKeys.add(k);
    }
  }
  if (state) saveShoppingChecked(w, allKeys);
  else saveShoppingChecked(w, new Set());
  rerenderShopping();
}

// ── Tab 3 : Suggestions ───────────────────────────────────────────────
function suggestionsFor(week, seed){
  const s = saison(week);
  // Recettes éligibles : bonne saison, pas "à remplacer"
  const eligible = (all || []).filter(r => {
    if (r.avis === '🤢 A remplacer') return false;
    if (Array.isArray(r.saison) && r.saison.length && !r.saison.includes(s)) return false;
    return true;
  });
  // Exclure recettes déjà dans semaines voisines (-1, current, +1)
  const adjacentWeeks = new Set([ww(week - 1), week, ww(week + 1)]);
  const inAdjacent = new Set();
  for (const r of (all || [])) {
    if (!Array.isArray(r.semaines)) continue;
    for (const sw of r.semaines) {
      const n = WM[sw];
      if (n != null && adjacentWeeks.has(n)) { inAdjacent.add(r.id); break; }
    }
  }
  const candidates = eligible.filter(r => !inAdjacent.has(r.id));
  // Scoring : coup de cœur > approuvé > ca passe > rien
  const score = (r) => {
    let v = 0;
    if (r.avis === '❤️ Coup de coeur') v += 30;
    else if (r.avis === '✅ Testé et approuvé') v += 20;
    else if (r.avis === '🤔 Ca passe toujours') v += 10;
    if (hasOwnPhoto(r)) v += 5; // bonus si photo perso
    return v;
  };
  // Shuffle déterministe avec seed
  const rng = mulberry32(seed);
  const ranked = candidates.map(r => ({ r, k: score(r) + rng() * 5 }));
  ranked.sort((a, b) => b.k - a.k);
  // Idéalement : 1 quiche/cake/tarte, 1 soupe/salade, 1 viande, 1 végé, 1 libre
  const wantedTypes = [
    { match: r => (r.type_plat || []).some(t => /Quiche|Tarte|Cake/i.test(t)) },
    { match: r => (r.type_plat || []).some(t => /Soupe|Salade/i.test(t)) },
    { match: r => (r.type_plat || []).some(t => /Dimanche/i.test(t)) },
    { match: r => r.regime === 'Végé' || r.regime === 'Vegan' },
    { match: r => true },
  ];
  const picked = [];
  const pickedIds = new Set();
  for (const w of wantedTypes) {
    const found = ranked.find(({ r }) => !pickedIds.has(r.id) && w.match(r));
    if (found) {
      picked.push(found.r);
      pickedIds.add(found.r.id);
    }
  }
  // Compléter à 5
  for (const { r } of ranked) {
    if (picked.length >= 5) break;
    if (!pickedIds.has(r.id)) {
      picked.push(r);
      pickedIds.add(r.id);
    }
  }
  return picked.slice(0, 5);
}

function mulberry32(seed){
  let a = seed | 0;
  return function(){
    a = a + 0x6D2B79F5 | 0;
    let t = a;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function getSuggestionSeed(week){
  if (!suggestionsCache[week]) suggestionsCache[week] = Math.floor(Math.random() * 1e9);
  return suggestionsCache[week];
}

function suggestionsShuffle(){
  suggestionsCache[planningWeek] = Math.floor(Math.random() * 1e9);
  buildPlanning();

async function suggestionAddTo(recetteId, week){
  const r = (all || []).find(x => String(x.id) === String(recetteId));
  if (!r) return;
  const weekLabel = WL[week] || `Semaine ${week}`;
  const newSemaines = [...(r.semaines || [])];
  if (!newSemaines.includes(weekLabel)) newSemaines.push(weekLabel);
  try {
    const res = await fetch(`${SB}/rest/v1/recettes?id=eq.${recetteId}`, {
      method: 'PATCH',
      headers: {
        'apikey': KEY,
        'Authorization': `Bearer ${KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({ semaines: newSemaines })
    });
    if (!res.ok) throw new Error(await res.text().catch(() => res.status));
    const updated = (await res.json())[0];
    const idx = all.findIndex(x => String(x.id) === String(recetteId));
    if (idx >= 0) all[idx] = updated;
    buildPlanning();
    buildSemaines();
    filterCat();
  } catch (e) {
    console.error('Suggestion add:', e);
    alert('Erreur : ' + e.message);
  }
}

        <span class="stats-bar-label">${escHtml(k)}</span>
        <div class="stats-bar-track"><div class="stats-bar-fill" style="width:${w}%"></div></div>
        <span class="stats-bar-value">${v}</span>
      </div>`;
    }
    h += `</div></div>`;
    return h;
  }
  html += barChart('Par type de plat', byType);
  html += barChart('Par régime', byRegime);
  html += barChart('Par saison', bySaison);
  html += barChart('Par cuisine', byCuisine);
  html += barChart('Par avis', byAvis);

  html += `<div style="height:20px"></div>`;
  return html;
}

function openAddRecette(){
  openRecipeForm(null);
}

async function deleteRecipe(recetteId){
  const r = (all || []).find(x => String(x.id) === String(recetteId));
  if (!r) return;
  if (!confirm(`Supprimer définitivement "${r.titre}" ?\n\nCette action est irréversible — la recette et toutes ses semaines planifiées seront perdues.`)) return;
  const btn = document.getElementById('form-delete-btn');
  if (btn) {
    btn.classList.add('busy');
    btn.disabled = true;
    btn.innerHTML = 'Suppression…';
  }
  try {
    const res = await fetch(`${SB}/rest/v1/recettes?id=eq.${recetteId}`, {
      method: 'DELETE',
      headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
    });
    if (!res.ok) throw new Error(`${res.status}: ${await res.text().catch(() => '')}`);
    const idx = all.findIndex(x => String(x.id) === String(recetteId));
    if (idx >= 0) all.splice(idx, 1);
    // Fermeture nette : on vide la pile pour éviter de retomber sur une frame
    // qui pointerait vers une recette qui n'existe plus
    sheetStack = [];
    sheetWeek = null;
    currentSheetId = null;
    closeSheet();
    buildSemaines();
    filterCat();
  } catch (e) {
    console.error('Delete:', e);
    if (btn) {
      btn.classList.remove('busy');
      btn.disabled = false;
      btn.innerHTML = icon('trash',{size:16,stroke:1.8}) + '<span>Supprimer la recette</span>';
    }
    alert('Erreur : ' + e.message);
  }
}

// ══════════════════════════════════════════════════════════════════════════
// FORMULAIRE RECETTE (ajout / modification)
// ══════════════════════════════════════════════════════════════════════════

// Fusion "Plat" + "Plat complet" → on garde le seul label canonique "Plat complet".
// (Les anciennes recettes en DB avec type_plat=["Plat"] sont quand même reconnues
//  par typeStyle.includes('Plat') côté affichage — pas de perte d'identité visuelle.)
const FORM_TYPES = [
  'Plat complet',
  'Dimanche midi',
  'Mercredi midi',
  'Quiche / Tarte / Cake',
  'Soupe',
  'Salade',
  'Entrée',
  'Dessert',
  'Tartines',
  'Goûter',
];
const FORM_REGIMES = ['Végé', 'Vegan', 'Poisson', 'Viande', 'Flexi'];
const FORM_SAISONS = [
  { value: 'Hiver',     label: '❄️ Hiver' },
  { value: 'Printemps', label: '🌷 Printemps' },
  { value: 'Été',       label: '☀️ Été' },
  { value: 'Automne',   label: '🍁 Automne' },
];
const FORM_AVIS = [
  '❤️ Coup de coeur',
  '✅ Testé et approuvé',
  '🤔 Ca passe toujours',
  '🤢 A remplacer',
];

function escAttr(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function distinctValues(field){
  const set = new Set();
  for (const r of all) {
    const v = r[field];
    if (Array.isArray(v)) v.forEach(x => { if (x) set.add(x); });
    else if (v) set.add(v);
  }
  return [...set];
}

function chipsHTML(field, options, selected, multi){
  const selArr = Array.isArray(selected) ? selected : (selected ? [selected] : []);
  return `<div class="form-chips" data-field="${field}" data-multi="${multi?1:0}">${
    options.map(opt => {
      const value = typeof opt === 'string' ? opt : opt.value;
      const label = typeof opt === 'string' ? opt : (opt.label || opt.value);
      const sel = selArr.includes(value) ? ' selected' : '';
      return `<button type="button" class="form-chip${sel}" data-value="${escAttr(value)}" onclick="toggleChip(this)">${label}</button>`;
    }).join('')
  }</div>`;
}

function weeksFormHTML(selected){
  const selArr = Array.isArray(selected) ? selected : [];
  let html = `<div class="form-chips form-chips-weeks" data-field="semaines" data-multi="1">`;
  for (let i = 1; i <= 52; i++) {
    const label = WL[i] || `Semaine ${i}`;
    const sel = selArr.includes(label) ? ' selected' : '';
    // Pas de teinte sur l'icône : si le chip est sélectionné, l'icône
    // doit hériter du blanc via .selected (cf CSS). Si non sélectionné,
    // on teinte directement le span pour avoir la couleur saison.
    const emoji = weekEmoji(i, { plain: true });
    const sm = SM[saison(i)];
    html += `<button type="button" class="form-chip-week${sel}" data-value="${escAttr(label)}" onclick="toggleChip(this)">
      <span class="form-chip-week-emoji" style="color:${sm.color}">${emoji}</span>
      <span class="form-chip-week-num">S${String(i).padStart(2,'0')}</span>
    </button>`;
  }
  html += `</div>`;
  return html;
}

function toggleChip(btn){
  const wrap = btn.closest('[data-field]');
  if (!wrap) return;
  const multi = wrap.dataset.multi === '1';
  if (multi) {
    btn.classList.toggle('selected');
  } else {
    const wasSelected = btn.classList.contains('selected');
    wrap.querySelectorAll('.form-chip, .form-chip-week').forEach(b => b.classList.remove('selected'));
    if (!wasSelected) btn.classList.add('selected');
  }
}

function buildRecipeFormHTML(r){
  const isNew = !r || !r.id;
  const d = r || {};
  // Union des types connus + ceux déjà utilisés dans les données
  const typesList = [...new Set([...FORM_TYPES, ...distinctValues('type_plat')])];
  const cuisinesList = distinctValues('cuisine');
  const titreId = isNew ? '' : d.id;
  return `
    <div class="form-header">
      <button type="button" class="form-cancel" onclick="cancelForm('${titreId}')">Annuler</button>
      <div class="form-header-title">${isNew ? 'Nouvelle recette' : 'Modifier'}</div>
      <button type="button" class="form-save" id="form-save-btn" onclick="saveRecipe('${titreId}')">Enregistrer</button>
    </div>
    <div class="form-body">
      <div class="form-section">
        <label class="form-label">Photos <span class="form-hint">jusqu'à 10, la première est l'image de couverture</span></label>
        ${formPhotosHTML(d, isNew)}
        <input type="file" id="form-photo-input" accept="image/*" hidden>
      </div>

      <div class="form-section">
        <label class="form-label">Titre</label>
        <input class="form-input" type="text" name="titre" placeholder="Ex. Quiche aux poireaux" value="${escAttr(d.titre)}">
      </div>

      <div class="form-section">
        <label class="form-label">Type de plat <span class="form-hint">plusieurs possibles</span></label>
        ${chipsHTML('type_plat', typesList, d.type_plat, true)}
      </div>

      <div class="form-section">
        <label class="form-label">Régime</label>
        ${chipsHTML('regime', FORM_REGIMES, d.regime, false)}
      </div>

      <div class="form-section">
        <label class="form-label">Saison <span class="form-hint">plusieurs possibles</span></label>
        ${chipsHTML('saison', FORM_SAISONS, d.saison, true)}
      </div>

      <div class="form-section">
        <label class="form-label">Cuisine</label>
        <input class="form-input" type="text" name="cuisine" list="form-cuisines-list" placeholder="Ex. Italien, Asiatique…" value="${escAttr(d.cuisine)}">
        <datalist id="form-cuisines-list">
          ${cuisinesList.map(c => `<option value="${escAttr(c)}">`).join('')}
        </datalist>
      </div>

      <div class="form-section">
        <label class="form-label">Avis</label>
        ${chipsHTML('avis', FORM_AVIS, d.avis, false)}
      </div>

      <div class="form-section">
        <label class="form-label">Ingrédients</label>
        <textarea class="form-textarea" name="ingredients" rows="6" placeholder="Un par ligne…">${escHtml(d.ingredients)}</textarea>
      </div>

      <div class="form-section">
        <label class="form-label">Recette</label>
        <textarea class="form-textarea" name="recette_ecrite" rows="10" placeholder="Les étapes…">${escHtml(d.recette_ecrite)}</textarea>
      </div>

      <div class="form-section">
        <label class="form-label">Semaines planifiées <span class="form-hint">plusieurs possibles</span></label>
        ${weeksFormHTML(d.semaines)}
      </div>

      ${isNew ? '' : `<div class="form-delete-row">
        <button type="button" class="form-delete-btn" id="form-delete-btn" onclick="deleteRecipe('${titreId}')">
          ${icon('trash',{size:16,stroke:1.8})}<span>Supprimer la recette</span>
        </button>
      </div>`}
    </div>
    <div class="sheet-pb"></div>
  `;
}

function openRecipeForm(recetteId){
  const r = recetteId ? all.find(x => String(x.id) === String(recetteId)) : null;
  currentSheetId = recetteId || null;
  document.getElementById('sheet-body').innerHTML = buildRecipeFormHTML(r);
  const sheet = document.getElementById('sheet');
  sheet.scrollTop = 0;
  requestAnimationFrame(() => {
    sheet.classList.add('open');
    document.getElementById('overlay').classList.add('open');
  });
}

function cancelForm(recetteId){
  if (recetteId) {
    openSheet(recetteId);
  } else {
    closeSheet();
  }
}

function collectFormData(){
  const get = s => document.querySelector(s);
  const chipsVals = field => [...document.querySelectorAll(`[data-field="${field}"] .selected`)].map(b => b.dataset.value);
  const chipVal = field => {
    const el = document.querySelector(`[data-field="${field}"] .selected`);
    return el ? el.dataset.value : null;
  };
  const text = sel => {
    const el = get(sel);
    if (!el) return '';
    return (el.value || '').trim();
  };
  const photos = [...document.querySelectorAll('.form-photo-item')].map(it => it.dataset.url).filter(Boolean);
  return {
    titre: text('input[name="titre"]'),
    type_plat: chipsVals('type_plat'),
    regime: chipVal('regime'),
    saison: chipsVals('saison'),
    cuisine: text('input[name="cuisine"]') || null,
    avis: chipVal('avis'),
    ingredients: (get('textarea[name="ingredients"]') || {}).value || null,
    recette_ecrite: (get('textarea[name="recette_ecrite"]') || {}).value || null,
    semaines: chipsVals('semaines'),
    photos: photos,
    photo_url: photos[0] || null,
  };
}

async function saveRecipe(recetteId){
  const data = collectFormData();
  if (!data.titre) {
    alert('Le titre est obligatoire');
    return;
  }
  // Nettoyage : arrays vides → null pour les colonnes nullable
  const payload = {};
  for (const [k, v] of Object.entries(data)) {
    if (v === undefined) continue;
    if (Array.isArray(v) && v.length === 0) payload[k] = null;
    else if (v === '') payload[k] = null;
    else payload[k] = v;
  }

  const btn = document.getElementById('form-save-btn');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '…';

  try {
    let savedId = recetteId;
    if (recetteId) {
      // PATCH
      const res = await fetch(`${SB}/rest/v1/recettes?id=eq.${recetteId}`, {
        method: 'PATCH',
        headers: {
          'apikey': KEY,
          'Authorization': `Bearer ${KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`${res.status}: ${await res.text().catch(() => '')}`);
      const updated = (await res.json())[0];
      const idx = all.findIndex(x => String(x.id) === String(recetteId));
      if (idx >= 0) all[idx] = updated;
    } else {
      // POST
      const res = await fetch(`${SB}/rest/v1/recettes`, {
        method: 'POST',
        headers: {
          'apikey': KEY,
          'Authorization': `Bearer ${KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`${res.status}: ${await res.text().catch(() => '')}`);
      const created = (await res.json())[0];
      all.push(created);
      savedId = created.id;
    }
    buildSemaines();
    filterCat();
    openSheet(savedId);
  } catch (e) {
    console.error('Save recipe:', e);
    btn.disabled = false;
    btn.textContent = originalText;
    alert('Erreur d\'enregistrement : ' + e.message);
  }
}

init().catch(e=>{
  console.error(e);
  document.getElementById('loader-s').innerHTML='<div style="padding:40px;text-align:center;color:red;font-size:13px;font-weight:600">Erreur de connexion</div>';
});
